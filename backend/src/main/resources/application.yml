server:
  port: 8080
  forward-headers-strategy: framework
  shutdown: graceful

spring:
  application:
    name: aiart-platform
  datasource:
    url: ${AIART_DB_URL:jdbc:mysql://localhost:3306/aiart_codex_platform?useUnicode=true&characterEncoding=utf8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true}
    username: ${AIART_DB_USER:root}
    password: ${AIART_DB_PASSWORD:}
    driver-class-name: com.mysql.cj.jdbc.Driver
  data:
    redis:
      host: ${AIART_REDIS_HOST:localhost}
      port: ${AIART_REDIS_PORT:6379}
  servlet:
    multipart:
      max-file-size: 50MB
      max-request-size: 100MB
  lifecycle:
    timeout-per-shutdown-phase: 30s

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
  global-config:
    db-config:
      id-type: assign_id

aiart:
  jwt:
    secret: ${AIART_JWT_SECRET:aiart-codex-platform-default-secret-please-change}
    expiration-seconds: ${AIART_JWT_EXPIRATION_SECONDS:604800}
  storage:
    provider: ${AIART_STORAGE_PROVIDER:local}
    upload-root: ${AIART_UPLOAD_ROOT:uploads}
    max-asset-bytes: ${AIART_MAX_ASSET_BYTES:104857600}
    download-expiry-seconds: ${AIART_DOWNLOAD_EXPIRY_SECONDS:300}
    minio:
      endpoint: ${AIART_MINIO_ENDPOINT:http://127.0.0.1:9000}
      public-endpoint: ${AIART_MINIO_PUBLIC_ENDPOINT:http://127.0.0.1:9000}
      access-key: ${AIART_MINIO_ACCESS_KEY:artforge}
      secret-key: ${AIART_MINIO_SECRET_KEY:artforge-local-secret}
      bucket: ${AIART_MINIO_BUCKET:artforge}
  cors:
    allowed-origins: ${AIART_CORS_ALLOWED_ORIGINS:http://127.0.0.1:5173,http://127.0.0.1:5174}
  security:
    login:
      max-attempts: ${AIART_LOGIN_MAX_ATTEMPTS:5}
      window-seconds: ${AIART_LOGIN_WINDOW_SECONDS:900}
  generation:
    sd-webui:
      base-url: ${AIART_SD_BASE_URL:http://127.0.0.1:7860}
      timeout-seconds: ${AIART_SD_TIMEOUT_SECONDS:300}

logging:
  level:
    com.aiart.platform: INFO

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: never
