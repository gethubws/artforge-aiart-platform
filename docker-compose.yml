name: artforge

services:
  mysql:
    image: mysql:8.4
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: aiart_codex_platform
      MYSQL_USER: aiart
      MYSQL_PASSWORD: ${AIART_DB_PASSWORD:?Set AIART_DB_PASSWORD in .env.docker}
      MYSQL_ROOT_PASSWORD: ${AIART_DB_ROOT_PASSWORD:?Set AIART_DB_ROOT_PASSWORD in .env.docker}
      TZ: Asia/Shanghai
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_0900_ai_ci
    volumes:
      - mysql_data:/var/lib/mysql
      - ./database/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -uroot -p$$MYSQL_ROOT_PASSWORD --silent"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 30s

  redis:
    image: redis:7.4-alpine
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10

  minio:
    image: minio/minio:RELEASE.2024-12-18T13-15-44Z
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${AIART_MINIO_ACCESS_KEY:?Set AIART_MINIO_ACCESS_KEY in .env.docker}
      MINIO_ROOT_PASSWORD: ${AIART_MINIO_SECRET_KEY:?Set AIART_MINIO_SECRET_KEY in .env.docker}
    volumes:
      - minio_data:/data
    ports:
      - "127.0.0.1:9000:9000"
      - "127.0.0.1:9001:9001"

  backend:
    build:
      context: ./backend
    restart: unless-stopped
    environment:
      SPRING_PROFILES_ACTIVE: prod
      AIART_DB_URL: jdbc:mysql://mysql:3306/aiart_codex_platform?useUnicode=true&characterEncoding=utf8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
      AIART_DB_USER: aiart
      AIART_DB_PASSWORD: ${AIART_DB_PASSWORD}
      AIART_REDIS_HOST: redis
      AIART_REDIS_PORT: 6379
      AIART_JWT_SECRET: ${AIART_JWT_SECRET:?Set AIART_JWT_SECRET in .env.docker}
      AIART_CORS_ALLOWED_ORIGINS: ${AIART_CORS_ALLOWED_ORIGINS:-http://127.0.0.1:5174}
      AIART_UPLOAD_ROOT: /app/uploads
      AIART_SD_BASE_URL: ${AIART_SD_BASE_URL:-http://host.docker.internal:7860}
      AIART_SD_TIMEOUT_SECONDS: ${AIART_SD_TIMEOUT_SECONDS:-300}
      AIART_STORAGE_PROVIDER: ${AIART_STORAGE_PROVIDER:-minio}
      AIART_DOWNLOAD_EXPIRY_SECONDS: ${AIART_DOWNLOAD_EXPIRY_SECONDS:-300}
      AIART_MINIO_ENDPOINT: http://minio:9000
      AIART_MINIO_PUBLIC_ENDPOINT: ${AIART_MINIO_PUBLIC_ENDPOINT:-http://127.0.0.1:9000}
      AIART_MINIO_ACCESS_KEY: ${AIART_MINIO_ACCESS_KEY}
      AIART_MINIO_SECRET_KEY: ${AIART_MINIO_SECRET_KEY}
      AIART_MINIO_BUCKET: ${AIART_MINIO_BUCKET:-artforge}
    volumes:
      - uploads_data:/app/uploads
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_started
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O - http://127.0.0.1:8080/actuator/health | grep -q UP"]
      interval: 15s
      timeout: 5s
      retries: 12
      start_period: 45s

  frontend:
    build:
      context: ./frontend
    restart: unless-stopped
    ports:
      - "${AIART_HTTP_PORT:-5174}:80"
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O - http://127.0.0.1/ >/dev/null"]
      interval: 15s
      timeout: 5s
      retries: 5

volumes:
  mysql_data:
  redis_data:
  minio_data:
  uploads_data:
